<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rylan's Typing Quest 🎈</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sky-top: #7ec8ff;
    --sky-bottom: #d8f3ff;
    --candy-pink: #ff5fa2;
    --candy-orange: #ffb340;
    --candy-yellow: #ffe14d;
    --candy-green: #5fd86b;
    --candy-blue: #4aa8ff;
    --candy-purple: #b06aff;
    --ink: #2c2058;
    --cloud: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: 'Baloo 2', 'Fredoka', sans-serif;
    background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 70%, #b8f0c8 100%);
    color: var(--ink);
    user-select: none;
    -webkit-user-select: none;
    cursor: default;
  }

  /* ---------- floating background shapes ---------- */
  .bg-deco { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .cloud {
    position: absolute; background: var(--cloud); border-radius: 60px;
    opacity: .85; animation: drift linear infinite;
  }
  .cloud::before, .cloud::after {
    content: ''; position: absolute; background: var(--cloud); border-radius: 50%;
  }
  .cloud.c1 { width: 140px; height: 44px; top: 8%; animation-duration: 55s; }
  .cloud.c1::before { width: 60px; height: 60px; top: -28px; left: 22px; }
  .cloud.c1::after  { width: 44px; height: 44px; top: -18px; left: 70px; }
  .cloud.c2 { width: 100px; height: 34px; top: 22%; animation-duration: 75s; animation-delay: -30s; }
  .cloud.c2::before { width: 44px; height: 44px; top: -20px; left: 16px; }
  .cloud.c2::after  { width: 32px; height: 32px; top: -13px; left: 52px; }
  .cloud.c3 { width: 170px; height: 50px; top: 50%; animation-duration: 95s; animation-delay: -60s; opacity:.5; }
  .cloud.c3::before { width: 70px; height: 70px; top: -32px; left: 28px; }
  .cloud.c3::after  { width: 50px; height: 50px; top: -20px; left: 88px; }
  @keyframes drift {
    from { left: -220px; }
    to   { left: 110%; }
  }

  .hill {
    position: absolute; bottom: -40px; border-radius: 50% 50% 0 0;
  }
  .hill.h1 { left: -10%; width: 60%; height: 130px; background: #8fe39a; }
  .hill.h2 { right: -15%; width: 70%; height: 110px; background: #a5ecae; }

  /* ---------- layout screens ---------- */
  .screen {
    position: fixed; inset: 0; z-index: 1;
    display: none; flex-direction: column; align-items: center;
    padding: 16px;
  }
  .screen.active { display: flex; }

  /* ---------- menu ---------- */
  #menu { justify-content: center; gap: 28px; }

  .game-title {
    font-family: 'Baloo 2', sans-serif; font-weight: 800;
    font-size: clamp(48px, 9vw, 96px);
    letter-spacing: 2px; text-align: center; line-height: 1;
    text-shadow: 0 6px 0 rgba(44,32,88,.18);
    animation: titleBounce 2.4s ease-in-out infinite;
  }
  .game-title span { display: inline-block; animation: letterWave 2.4s ease-in-out infinite; }
  .game-title span:nth-child(2n)  { animation-delay: .12s; }
  .game-title span:nth-child(3n)  { animation-delay: .24s; }
  .game-title span:nth-child(5n)  { animation-delay: .36s; }
  @keyframes letterWave {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50%      { transform: translateY(-10px) rotate(3deg); }
  }
  @keyframes titleBounce { 0%,100% { transform: scale(1);} 50% { transform: scale(1.02);} }
  .game-title .line2 {
    display: block; font-size: .6em; letter-spacing: 4px; margin-top: 4px;
    text-shadow: 0 4px 0 rgba(44,32,88,.18);
  }

  .rainbow-1 { color: var(--candy-pink); }
  .rainbow-2 { color: var(--candy-orange); }
  .rainbow-3 { color: #f5c518; }
  .rainbow-4 { color: var(--candy-green); }
  .rainbow-5 { color: var(--candy-blue); }
  .rainbow-6 { color: var(--candy-purple); }

  .menu-sub {
    font-size: clamp(18px, 3vw, 26px); font-weight: 600; color: var(--ink);
    background: rgba(255,255,255,.7); padding: 8px 22px; border-radius: 999px;
  }

  .mode-cards { display: flex; gap: 22px; flex-wrap: wrap; justify-content: center; }

  .mode-card {
    width: 220px; padding: 22px 16px 18px; border: none; border-radius: 28px;
    font-family: inherit; font-weight: 700; font-size: 22px; color: #fff;
    cursor: pointer; text-align: center;
    box-shadow: 0 8px 0 rgba(0,0,0,.18), 0 14px 24px rgba(44,32,88,.18);
    transition: transform .12s ease, box-shadow .12s ease;
    position: relative;
  }
  .mode-card:hover { transform: translateY(-6px) scale(1.04) rotate(-1deg); }
  .mode-card:active { transform: translateY(2px) scale(.98); box-shadow: 0 3px 0 rgba(0,0,0,.18); }
  .mode-card .big-emoji { font-size: 64px; display: block; margin-bottom: 8px; filter: drop-shadow(0 4px 4px rgba(0,0,0,.2)); }
  .mode-card .mode-hint { display: block; font-size: 14px; font-weight: 500; opacity: .92; margin-top: 4px; }
  .mode-card.pink   { background: linear-gradient(180deg, #ff7eb6, var(--candy-pink)); }
  .mode-card.orange { background: linear-gradient(180deg, #ffc46b, #ff9425); }
  .mode-card.purple { background: linear-gradient(180deg, #c68aff, var(--candy-purple)); }

  .trophy-shelf {
    display: flex; align-items: center; gap: 10px;
    background: rgba(255,255,255,.75); border-radius: 999px; padding: 10px 24px;
    font-size: 28px; min-height: 54px;
    box-shadow: 0 4px 12px rgba(44,32,88,.12);
  }
  .trophy-shelf .shelf-label { font-size: 16px; font-weight: 700; color: var(--ink); }
  .trophy-shelf .locked { filter: grayscale(1); opacity: .35; }

  .gem-cave-btn {
    border: none; cursor: pointer; font-family: inherit;
    background: linear-gradient(180deg, #6b54a8, #43326f); color: #fff;
    font-size: 20px; font-weight: 700; padding: 12px 30px; border-radius: 999px;
    box-shadow: 0 6px 0 rgba(0,0,0,.25), 0 0 18px rgba(176,106,255,.45);
    transition: transform .12s ease;
  }
  .gem-cave-btn:hover { transform: scale(1.06) rotate(-1deg); }
  .gem-cave-btn:active { transform: translateY(3px); }

  /* ---------- gem cave screen ---------- */
  #gemcave {
    justify-content: center; gap: 20px;
    background: radial-gradient(ellipse at 50% 130%, #4a3a78 0%, #241c45 55%, #151031 100%);
  }
  #gemcave h2 {
    color: #fff; font-size: clamp(32px, 6vw, 52px); font-weight: 800;
    text-shadow: 0 4px 0 rgba(0,0,0,.35), 0 0 24px rgba(176,106,255,.5);
  }
  .gem-grid { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; max-width: 780px; }
  .gem-card {
    width: 150px; padding: 18px 10px 14px; border-radius: 22px; text-align: center;
    background: rgba(255,255,255,.07); border: 2px solid rgba(255,255,255,.16);
  }
  .gem-card .gem-emoji {
    font-size: 54px; display: block;
    filter: drop-shadow(0 0 14px rgba(255,255,255,.5));
    animation: gemTwinkle 2.6s ease-in-out infinite;
  }
  @keyframes gemTwinkle { 0%,100% { transform: scale(1);} 50% { transform: scale(1.08) rotate(3deg);} }
  .gem-card.none .gem-emoji { filter: grayscale(1) brightness(.35); animation: none; }
  .gem-card .gem-name { color: #fff; font-weight: 700; font-size: 17px; margin-top: 6px; display: block; }
  .gem-card .gem-count { color: #cfc4f5; font-weight: 700; font-size: 14px; }
  .gem-card.tier-rare { border-color: rgba(255,138,194,.7); }
  .gem-card.tier-legendary { border-color: rgba(255,225,77,.8); box-shadow: 0 0 20px rgba(255,225,77,.3); }

  /* gem found toast */
  #gemToast {
    position: fixed; top: 14%; left: 50%; transform: translateX(-50%) scale(0); z-index: 70;
    background: linear-gradient(180deg, #fffdf2, #ffeccf); color: var(--ink);
    border-radius: 24px; padding: 12px 30px; font-size: 26px; font-weight: 800;
    box-shadow: 0 12px 30px rgba(0,0,0,.3); pointer-events: none; white-space: nowrap;
    transition: transform .25s cubic-bezier(.5,1.8,.5,1);
  }
  #gemToast.show { transform: translateX(-50%) scale(1); }
  #gemToast .toast-gem { font-size: 34px; vertical-align: -4px; }

  /* ---------- HUD ---------- */
  .hud {
    width: 100%; max-width: 980px; display: flex; align-items: center;
    justify-content: space-between; gap: 12px; margin-bottom: 4px;
  }
  .hud-btn {
    border: none; border-radius: 999px; padding: 10px 22px;
    font-family: inherit; font-size: 18px; font-weight: 700; color: #fff;
    background: linear-gradient(180deg, #6c7bff, #4a5be8);
    box-shadow: 0 5px 0 rgba(0,0,0,.18); cursor: pointer;
    transition: transform .1s ease;
  }
  .hud-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,.18); }
  .hud-btn.hint { background: linear-gradient(180deg, #ffd34d, #fdb813); color: var(--ink); }

  .star-pill {
    display: flex; align-items: center; gap: 6px;
    background: #fff; border-radius: 999px; padding: 8px 20px;
    font-size: 22px; font-weight: 800;
    box-shadow: 0 4px 10px rgba(44,32,88,.15);
  }
  .star-pill .star-icon { font-size: 26px; animation: starSpin 4s linear infinite; display: inline-block; }
  @keyframes starSpin { 0%,80% { transform: rotate(0);} 90% { transform: rotate(20deg);} 95% { transform: rotate(-15deg);} 100% { transform: rotate(0);} }

  .streak-pill {
    background: linear-gradient(180deg, #ff9f68, #ff7043); color: #fff;
    border-radius: 999px; padding: 8px 18px; font-size: 18px; font-weight: 800;
    box-shadow: 0 4px 10px rgba(255,112,67,.4);
    opacity: 0; transform: scale(.6); transition: all .25s cubic-bezier(.5,1.8,.5,1);
  }
  .streak-pill.show { opacity: 1; transform: scale(1); }

  /* ---------- play area ---------- */
  .play-area {
    flex: 1; width: 100%; max-width: 980px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px; min-height: 0;
  }

  /* balloon (letter pop) */
  .balloon-zone { position: relative; display: flex; align-items: center; justify-content: center; flex: 1; width: 100%; min-height: 0; }
  .balloon {
    width: clamp(180px, 32vh, 280px); height: clamp(216px, 38.5vh, 336px);
    border-radius: 50% 50% 48% 48% / 55% 55% 44% 44%;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    animation: balloonFloat 3s ease-in-out infinite;
    box-shadow: inset -16px -20px 0 rgba(0,0,0,.08);
    transition: transform .15s ease;
  }
  .balloon::after {
    content: ''; position: absolute; bottom: -34px; left: 50%;
    width: 3px; height: 36px; background: rgba(44,32,88,.35); transform: translateX(-50%);
  }
  .balloon::before {
    content: ''; position: absolute; top: 12%; left: 18%;
    width: 22%; height: 16%; background: rgba(255,255,255,.45);
    border-radius: 50%; transform: rotate(-30deg);
  }
  @keyframes balloonFloat {
    0%, 100% { transform: translateY(0) rotate(-2deg); }
    50%      { transform: translateY(-18px) rotate(2deg); }
  }
  .balloon .letter {
    font-family: 'Baloo 2', sans-serif; font-weight: 800;
    font-size: clamp(110px, 20vh, 170px); color: #fff;
    text-shadow: 0 6px 0 rgba(0,0,0,.18);
  }
  .balloon.wrong { animation: balloonShake .4s ease; }
  @keyframes balloonShake {
    0%,100% { transform: translateX(0) rotate(0); }
    25% { transform: translateX(-14px) rotate(-4deg); }
    75% { transform: translateX(14px) rotate(4deg); }
  }
  .balloon.popped { animation: balloonPop .35s ease forwards; }
  @keyframes balloonPop {
    0%   { transform: scale(1); opacity: 1; }
    40%  { transform: scale(1.25); opacity: 1; }
    100% { transform: scale(0); opacity: 0; }
  }

  /* word modes */
  .word-emoji {
    font-size: clamp(80px, 16vh, 140px); line-height: 1;
    filter: drop-shadow(0 8px 8px rgba(44,32,88,.2));
    animation: emojiBob 2.2s ease-in-out infinite;
    cursor: pointer;
  }
  @keyframes emojiBob { 0%,100% { transform: translateY(0) scale(1);} 50% { transform: translateY(-10px) scale(1.05);} }

  .word-boxes { display: flex; gap: 12px; }
  .letter-box {
    width: clamp(58px, 10vh, 84px); height: clamp(70px, 12vh, 100px);
    background: #fff; border-radius: 18px;
    border-bottom: 8px solid #d4cdee;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Baloo 2', sans-serif; font-weight: 800;
    font-size: clamp(38px, 7vh, 56px);
    box-shadow: 0 6px 14px rgba(44,32,88,.12);
    transition: transform .12s ease;
  }
  .letter-box.ghost { color: #c9c2e6; }
  .letter-box.filled { color: var(--ink); border-bottom-color: var(--candy-green); animation: boxBounce .35s cubic-bezier(.5,1.8,.5,1); }
  .letter-box.current { outline: 4px dashed var(--candy-blue); outline-offset: 3px; animation: currentPulse 1s ease-in-out infinite; }
  @keyframes boxBounce { 0% { transform: scale(.6);} 60% { transform: scale(1.18);} 100% { transform: scale(1);} }
  @keyframes currentPulse { 0%,100% { transform: scale(1);} 50% { transform: scale(1.07);} }
  .word-boxes.word-done .letter-box { animation: doneWave .5s ease; border-bottom-color: var(--candy-yellow); }
  .word-boxes.word-done .letter-box:nth-child(2) { animation-delay: .07s; }
  .word-boxes.word-done .letter-box:nth-child(3) { animation-delay: .14s; }
  .word-boxes.word-done .letter-box:nth-child(4) { animation-delay: .21s; }
  .word-boxes.word-done .letter-box:nth-child(5) { animation-delay: .28s; }
  @keyframes doneWave { 0%,100% { transform: translateY(0);} 50% { transform: translateY(-22px);} }

  .speak-tip { font-size: 16px; font-weight: 600; color: var(--ink); opacity: .65; }

  /* progress dots */
  .round-dots { display: flex; gap: 8px; }
  .round-dots .dot {
    width: 16px; height: 16px; border-radius: 50%;
    background: rgba(255,255,255,.8); box-shadow: inset 0 2px 3px rgba(44,32,88,.15);
    transition: all .2s ease;
  }
  .round-dots .dot.done { background: var(--candy-yellow); transform: scale(1.15); box-shadow: 0 0 8px rgba(255,225,77,.8); }

  /* ---------- on-screen keyboard ---------- */
  .kb { display: flex; flex-direction: column; align-items: center; gap: 7px; padding: 14px 10px 18px; width: 100%; }
  .kb-row { display: flex; gap: 7px; justify-content: center; }
  .kb-key {
    width: clamp(34px, 5.8vw, 60px); height: clamp(42px, 7vh, 60px);
    background: #fff; border-radius: 12px;
    border-bottom: 5px solid #cfc8ea;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Baloo 2', sans-serif; font-weight: 700;
    font-size: clamp(17px, 3vh, 26px); color: var(--ink);
    box-shadow: 0 3px 8px rgba(44,32,88,.1);
    transition: all .1s ease;
  }
  .kb-key.glow {
    background: linear-gradient(180deg, var(--candy-yellow), #ffd000);
    border-bottom-color: #e0a800;
    transform: scale(1.18); z-index: 2;
    box-shadow: 0 0 18px rgba(255, 214, 0, .9);
    animation: keyGlowPulse .8s ease-in-out infinite;
  }
  @keyframes keyGlowPulse { 0%,100% { transform: scale(1.18);} 50% { transform: scale(1.3);} }
  .kb-key.pressed { transform: translateY(3px) scale(.94); border-bottom-width: 2px; background: #e8e3fa; }
  .kb-key.pressed.glow { background: linear-gradient(180deg, var(--candy-green), #3cba49); border-bottom-color: #2c8c36; }

  /* ---------- celebration overlay ---------- */
  #celebrate {
    position: fixed; inset: 0; z-index: 50; display: none;
    align-items: center; justify-content: center; flex-direction: column; gap: 18px;
    background: rgba(44,32,88,.45); backdrop-filter: blur(3px);
  }
  #celebrate.show { display: flex; }
  .celebrate-card {
    background: linear-gradient(180deg, #fffdf2, #fff3d6);
    border-radius: 36px; padding: 40px 60px; text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,.35);
    animation: cardPopIn .5s cubic-bezier(.5,1.8,.5,1);
  }
  @keyframes cardPopIn { from { transform: scale(.3) rotate(-8deg); opacity: 0; } to { transform: scale(1) rotate(0); opacity: 1; } }
  .celebrate-card .trophy { font-size: 100px; display: block; animation: trophyWiggle 1s ease-in-out infinite; }
  @keyframes trophyWiggle { 0%,100% { transform: rotate(-6deg) scale(1);} 50% { transform: rotate(6deg) scale(1.1);} }
  .celebrate-card h2 { font-size: 44px; font-weight: 800; color: var(--ink); margin: 8px 0 4px; }
  .celebrate-card p { font-size: 22px; font-weight: 600; color: #7a6fae; margin-bottom: 20px; }
  .celebrate-card .hud-btn { font-size: 24px; padding: 14px 36px; }

  /* confetti + fx layers */
  #fx { position: fixed; inset: 0; pointer-events: none; z-index: 60; }
  .confetti-bit { position: absolute; width: 14px; height: 14px; will-change: transform, opacity; }
  .float-star { position: absolute; font-size: 34px; will-change: transform, opacity; animation: floatUp 1s ease-out forwards; }
  @keyframes floatUp {
    from { transform: translateY(0) scale(.6); opacity: 1; }
    to   { transform: translateY(-130px) scale(1.4); opacity: 0; }
  }

  .tap-to-start {
    position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center;
    background: transparent;
  }
</style>
</head>
<body>

<div class="bg-deco">
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
  <div class="cloud c3"></div>
  <div class="hill h1"></div>
  <div class="hill h2"></div>
</div>

<!-- ============ MENU ============ -->
<div class="screen active" id="menu">
  <h1 class="game-title" id="gameTitle"></h1>
  <div class="menu-sub">Pick a game! 👇</div>
  <div class="mode-cards">
    <button class="mode-card pink" data-mode="pop">
      <span class="big-emoji">🎈</span>
      Letter Pop!
      <span class="mode-hint">Press the letter to pop the balloon</span>
    </button>
    <button class="mode-card orange" data-mode="build">
      <span class="big-emoji">🧱</span>
      Word Builder
      <span class="mode-hint">Copy the word, letter by letter</span>
    </button>
    <button class="mode-card purple" data-mode="spell">
      <span class="big-emoji">🪄</span>
      Spell It!
      <span class="mode-hint">Spell the picture all by yourself</span>
    </button>
  </div>
  <button class="gem-cave-btn" id="gemCaveBtn">💎 My Gem Cave</button>
  <div class="trophy-shelf" id="trophyShelf"></div>
</div>

<!-- ============ GEM CAVE ============ -->
<div class="screen" id="gemcave">
  <h2>💎 Rylan's Gem Cave 💎</h2>
  <div class="gem-grid" id="gemGrid"></div>
  <button class="hud-btn" id="gemBackBtn">⬅ Back</button>
</div>

<!-- ============ GAME ============ -->
<div class="screen" id="game">
  <div class="hud">
    <button class="hud-btn" id="backBtn">⬅ Back</button>
    <div class="round-dots" id="roundDots"></div>
    <div style="display:flex; gap:10px; align-items:center;">
      <div class="streak-pill" id="streakPill">🔥 0</div>
      <button class="hud-btn hint" id="hintBtn" style="display:none;">💡 Hint</button>
      <div class="star-pill">💎<span id="gemCount">0</span></div>
      <div class="star-pill"><span class="star-icon">⭐</span><span id="starCount">0</span></div>
    </div>
  </div>

  <div class="play-area" id="playArea"></div>

  <div class="kb" id="keyboard"></div>
</div>

<!-- ============ CELEBRATION ============ -->
<div id="celebrate">
  <div class="celebrate-card">
    <span class="trophy" id="celebrateEmoji">🏆</span>
    <h2 id="celebrateTitle">AMAZING!</h2>
    <p id="celebrateSub">You did it!</p>
    <button class="hud-btn" id="celebrateBtn">Play More! 🎉</button>
  </div>
</div>

<div id="gemToast"></div>
<div id="fx"></div>

<script>
'use strict';

/* ================= data ================= */
const WORDS_EASY = [
  ['CAT','🐱'], ['DOG','🐶'], ['SUN','☀️'], ['BUS','🚌'], ['HAT','🎩'],
  ['PIG','🐷'], ['CUP','🥤'], ['BED','🛏️'], ['FOX','🦊'], ['BEE','🐝'],
  ['COW','🐮'], ['EGG','🥚'], ['KEY','🔑'], ['OWL','🦉'], ['PEN','🖊️'],
  ['MAP','🗺️'], ['BAT','🦇'], ['ANT','🐜'], ['CAR','🚗'], ['TOY','🧸'],
];
const WORDS_MED = [
  ['FISH','🐟'], ['FROG','🐸'], ['CAKE','🎂'], ['MOON','🌙'], ['BALL','⚽'],
  ['DUCK','🦆'], ['MILK','🥛'], ['TREE','🌳'], ['STAR','⭐'], ['BOAT','⛵'],
  ['LION','🦁'], ['BEAR','🐻'], ['CORN','🌽'], ['KITE','🪁'], ['RAIN','🌧️'],
  ['SOCK','🧦'], ['BIRD','🐦'], ['CRAB','🦀'], ['DRUM','🥁'], ['SHIP','🚢'],
];
const WORDS_PERSONAL = [
  ['RYLAN','🧒'], ['MOM','👩'], ['DAD','👨'], ['GEM','💎'],
];
const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
// [key, emoji, name, tier]
const GEMS = [
  ['pearl',    '⚪', 'PEARL',    'common'],
  ['topaz',    '🔶', 'TOPAZ',    'common'],
  ['emerald',  '🟢', 'EMERALD',  'common'],
  ['sapphire', '🔷', 'SAPPHIRE', 'uncommon'],
  ['amethyst', '🟣', 'AMETHYST', 'uncommon'],
  ['ruby',     '♦️', 'RUBY',     'rare'],
  ['diamond',  '💎', 'DIAMOND',  'rare'],
  ['rainbow',  '🌈', 'RAINBOW GEM', 'legendary'],
];
const TIER_ORDER = ['common', 'uncommon', 'rare', 'legendary'];
const TIER_WEIGHTS = { common: 55, uncommon: 28, rare: 13, legendary: 4 };
const BALLOON_COLORS = ['#ff5fa2','#ffb340','#5fd86b','#4aa8ff','#b06aff','#ff7043','#2bc7b9'];
const ROUND_LENGTH = 8;
const TROPHIES = [
  [0,'🐣'], [25,'🐥'], [50,'🐰'], [100,'🦊'], [150,'🦁'], [200,'🦄'], [300,'🐉'], [400,'👑'],
];
const PRAISE = ['GREAT JOB!','AWESOME!','SUPER STAR!','YOU ROCK!','FANTASTIC!','WOW!'];

/* ================= state ================= */
let stars = Number(localStorage.getItem('tq_stars') || 0);
let gems = JSON.parse(localStorage.getItem('tq_gems') || '{}');
let mode = null;          // 'pop' | 'build' | 'spell'
let target = '';          // current word or letter
let pos = 0;              // index into target
let roundDone = 0;        // items completed this round
let streak = 0;
let busy = false;         // ignore input during animations
let rylanBonus = false;   // spelled his name this round → rare+ round gem
let recentTargets = [];

/* ================= dom ================= */
const $ = (id) => document.getElementById(id);
const menuEl = $('menu'), gameEl = $('game'), playArea = $('playArea');
const keyboardEl = $('keyboard'), hintBtn = $('hintBtn');

/* ================= audio (WebAudio bleeps) ================= */
let actx = null;
function audio() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === 'suspended') actx.resume();
  return actx;
}
function tone(freq, start, dur, type = 'sine', vol = 0.18) {
  const ctx = audio();
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(0.0001, ctx.currentTime + start);
  g.gain.exponentialRampToValueAtTime(vol, ctx.currentTime + start + 0.015);
  g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + start + dur);
  o.connect(g).connect(ctx.destination);
  o.start(ctx.currentTime + start); o.stop(ctx.currentTime + start + dur + 0.05);
}
const sndKey   = () => tone(660, 0, 0.09, 'triangle', 0.12);
const sndWrong = () => { tone(220, 0, 0.15, 'square', 0.07); tone(180, 0.1, 0.2, 'square', 0.07); };
const sndPop   = () => { tone(880, 0, 0.07, 'triangle', 0.2); tone(1320, 0.05, 0.12, 'sine', 0.15); };
const sndWord  = () => { [523, 659, 784, 1047].forEach((f, i) => tone(f, i * 0.09, 0.18, 'triangle', 0.16)); };
const sndFanfare = () => { [523,659,784,1047,784,1047,1319].forEach((f,i)=>tone(f, i*0.12, 0.22, 'triangle', 0.17)); };
const sndGem = () => { [1047,1319,1568,2093].forEach((f,i)=>tone(f, i*0.06, 0.14, 'sine', 0.14)); };

/* ================= speech ================= */
let voice = null;
function pickVoice() {
  const vs = speechSynthesis.getVoices();
  voice = vs.find(v => v.lang.startsWith('en') && /Samantha|Google US/i.test(v.name))
       || vs.find(v => v.lang.startsWith('en')) || null;
}
if ('speechSynthesis' in window) {
  pickVoice();
  speechSynthesis.onvoiceschanged = pickVoice;
}
function say(text, rate = 0.85) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = rate; u.pitch = 1.15;
  if (voice) u.voice = voice;
  speechSynthesis.speak(u);
}
function sayWordSpelled(word) {
  // "C... A... T... CAT!"
  say(word.split('').join(', ') + '. ' + word + '!', 0.8);
}

/* ================= confetti & fx ================= */
const fx = $('fx');
function confetti(x, y, n = 26) {
  const colors = BALLOON_COLORS.concat('#ffe14d');
  for (let i = 0; i < n; i++) {
    const b = document.createElement('div');
    b.className = 'confetti-bit';
    const size = 8 + Math.random() * 10;
    b.style.cssText = `left:${x}px; top:${y}px; width:${size}px; height:${size}px;
      background:${colors[i % colors.length]};
      border-radius:${Math.random() > .5 ? '50%' : '3px'};`;
    fx.appendChild(b);
    const ang = Math.random() * Math.PI * 2;
    const v = 220 + Math.random() * 380;
    const vx = Math.cos(ang) * v, vy = Math.sin(ang) * v - 180;
    b.animate([
      { transform: 'translate(0,0) rotate(0deg)', opacity: 1 },
      { transform: `translate(${vx * 0.5}px, ${vy * 0.5 + 200}px) rotate(${360 + Math.random()*360}deg)`, opacity: 1, offset: 0.6 },
      { transform: `translate(${vx}px, ${vy + 560}px) rotate(${720 + Math.random()*360}deg)`, opacity: 0 },
    ], { duration: 1100 + Math.random() * 500, easing: 'cubic-bezier(.2,.6,.4,1)' })
      .onfinish = () => b.remove();
  }
}
function bigConfetti() {
  const w = innerWidth, h = innerHeight;
  confetti(w * 0.25, h * 0.3, 30);
  setTimeout(() => confetti(w * 0.75, h * 0.3, 30), 150);
  setTimeout(() => confetti(w * 0.5, h * 0.2, 36), 300);
}
function floatStar(x, y) {
  const s = document.createElement('div');
  s.className = 'float-star'; s.textContent = '⭐';
  s.style.left = (x - 17) + 'px'; s.style.top = (y - 17) + 'px';
  fx.appendChild(s);
  setTimeout(() => s.remove(), 1000);
}

/* ================= stars / trophies ================= */
function addStar(x, y) {
  stars++;
  localStorage.setItem('tq_stars', stars);
  $('starCount').textContent = stars;
  if (x !== undefined) floatStar(x, y);
}
/* ================= gems ================= */
function gemTotal() {
  return Object.values(gems).reduce((s, n) => s + n, 0);
}
function rollGem(luck = 1) {
  const entries = TIER_ORDER.map(t =>
    [t, (t === 'rare' || t === 'legendary') ? TIER_WEIGHTS[t] * luck : TIER_WEIGHTS[t]]);
  let r = Math.random() * entries.reduce((s, [, w]) => s + w, 0);
  let tier = 'common';
  for (const [t, w] of entries) { if ((r -= w) < 0) { tier = t; break; } }
  const opts = GEMS.filter(g => g[3] === tier);
  return opts[Math.floor(Math.random() * opts.length)];
}
function awardGem(x, y, luck = 1, minTier = null) {
  let gem = rollGem(luck);
  let guard = 0;
  while (minTier && TIER_ORDER.indexOf(gem[3]) < TIER_ORDER.indexOf(minTier) && guard++ < 50) {
    gem = rollGem(luck * 2);
  }
  const [key, emoji, name, tier] = gem;
  gems[key] = (gems[key] || 0) + 1;
  localStorage.setItem('tq_gems', JSON.stringify(gems));
  $('gemCount').textContent = gemTotal();
  const toast = $('gemToast');
  toast.innerHTML = `<span class="toast-gem">${emoji}</span> You found a ${name}!`;
  toast.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => toast.classList.remove('show'), 1700);
  sndGem();
  if (x !== undefined) {
    const s = document.createElement('div');
    s.className = 'float-star'; s.textContent = emoji;
    s.style.left = (x - 17) + 'px'; s.style.top = (y - 17) + 'px';
    fx.appendChild(s);
    setTimeout(() => s.remove(), 1000);
  }
  if (tier === 'legendary') bigConfetti();
}
function renderGemCave() {
  $('gemGrid').innerHTML = GEMS.map(([key, emoji, name, tier]) => {
    const n = gems[key] || 0;
    return `<div class="gem-card tier-${tier} ${n ? '' : 'none'}">
      <span class="gem-emoji">${emoji}</span>
      <span class="gem-name">${n ? name : '???'}</span>
      <span class="gem-count">${n ? '× ' + n : 'Keep typing!'}</span>
    </div>`;
  }).join('');
}

function renderTrophies() {
  const shelf = $('trophyShelf');
  shelf.innerHTML = '<span class="shelf-label">My friends:</span>' +
    TROPHIES.map(([need, emoji]) =>
      `<span class="${stars >= need ? '' : 'locked'}" title="${need} stars">${emoji}</span>`
    ).join('');
}

/* ================= keyboard ================= */
const KB_ROWS = ['QWERTYUIOP', 'ASDFGHJKL', 'ZXCVBNM'];
function buildKeyboard() {
  keyboardEl.innerHTML = KB_ROWS.map(row =>
    `<div class="kb-row">` +
    row.split('').map(k => `<div class="kb-key" data-key="${k}">${k}</div>`).join('') +
    `</div>`
  ).join('');
}
function glowKey(letter) {
  document.querySelectorAll('.kb-key.glow').forEach(k => k.classList.remove('glow'));
  if (!letter) return;
  const el = document.querySelector(`.kb-key[data-key="${letter}"]`);
  if (el) el.classList.add('glow');
}
function flashKeyPressed(letter) {
  const el = document.querySelector(`.kb-key[data-key="${letter}"]`);
  if (!el) return;
  el.classList.add('pressed');
  setTimeout(() => el.classList.remove('pressed'), 160);
}

/* ================= round dots ================= */
function renderDots() {
  $('roundDots').innerHTML = Array.from({ length: ROUND_LENGTH },
    (_, i) => `<div class="dot ${i < roundDone ? 'done' : ''}"></div>`).join('');
}

/* ================= streak ================= */
function bumpStreak() {
  streak++;
  const pill = $('streakPill');
  pill.textContent = '🔥 ' + streak;
  pill.classList.toggle('show', streak >= 3);
}
function resetStreak() {
  streak = 0;
  $('streakPill').classList.remove('show');
}

/* ================= target picking ================= */
function pickFrom(arr) {
  let item, guard = 0;
  do {
    item = arr[Math.floor(Math.random() * arr.length)];
    guard++;
  } while (recentTargets.includes(item[0] || item) && guard < 20);
  recentTargets.push(item[0] || item);
  if (recentTargets.length > 6) recentTargets.shift();
  return item;
}

/* ================= modes ================= */
function nextChallenge() {
  busy = false;
  if (mode === 'pop') {
    const letter = pickFrom(LETTERS.map(l => [l]))[0];
    target = letter; pos = 0;
    const color = BALLOON_COLORS[Math.floor(Math.random() * BALLOON_COLORS.length)];
    playArea.innerHTML = `
      <div class="balloon-zone">
        <div class="balloon" id="balloon" style="background:${color}">
          <span class="letter">${letter}</span>
        </div>
      </div>`;
    glowKey(letter);
    say(letter);
  } else {
    let pool = mode === 'build' ? WORDS_EASY.concat(WORDS_MED) : (roundDone < 4 ? WORDS_EASY : WORDS_MED);
    if (Math.random() < 0.3) pool = WORDS_PERSONAL; // his own words show up often
    const [word, emoji] = pickFrom(pool);
    target = word; pos = 0;
    playArea.innerHTML = `
      <div class="word-emoji" id="wordEmoji" title="Tap to hear the word">${emoji}</div>
      <div class="word-boxes" id="wordBoxes">
        ${word.split('').map((ch, i) => `
          <div class="letter-box ${mode === 'build' ? 'ghost' : ''} ${i === 0 ? 'current' : ''}" data-i="${i}">
            ${mode === 'build' ? ch : ''}
          </div>`).join('')}
      </div>
      <div class="speak-tip">🔊 Tap the picture to hear the word again</div>`;
    $('wordEmoji').addEventListener('click', () => say(wordPrompt()));
    glowKey(mode === 'build' ? word[0] : null);
    say(wordPrompt());
  }
}
function wordPrompt() {
  return mode === 'spell' ? `Spell... ${targetAsWord()}` : targetAsWord();
}
function targetAsWord() { return target.charAt(0) + target.slice(1).toLowerCase(); }

/* ================= input handling ================= */
function handleLetter(letter) {
  if (busy || !mode) return;
  flashKeyPressed(letter);

  if (mode === 'pop') {
    if (letter === target) {
      busy = true;
      sndPop();
      const b = $('balloon');
      b.classList.add('popped');
      const r = b.getBoundingClientRect();
      confetti(r.left + r.width / 2, r.top + r.height / 2, 22);
      addStar(r.left + r.width / 2, r.top);
      bumpStreak();
      completeOne();
    } else {
      wrongAnswer($('balloon'));
    }
    return;
  }

  // word modes
  if (letter === target[pos]) {
    sndKey();
    const box = document.querySelector(`.letter-box[data-i="${pos}"]`);
    box.textContent = letter;
    box.classList.remove('ghost', 'current');
    box.classList.add('filled');
    pos++;
    if (pos >= target.length) {
      busy = true;
      $('wordBoxes').classList.add('word-done');
      sndWord();
      if (target === 'RYLAN') {
        say('R, Y, L, A, N. Rylan! You spelled your name!', 0.8);
      } else {
        sayWordSpelled(target);
      }
      const r = $('wordBoxes').getBoundingClientRect();
      confetti(r.left + r.width / 2, r.top, 26);
      addStar(r.left + r.width / 2, r.top);
      if (mode === 'spell') addStar(); // spelling earns double
      if (target === 'RYLAN') rylanBonus = true; // his name upgrades the round's gem
      bumpStreak();
      glowKey(null);
      completeOne(1600);
    } else {
      const nextBox = document.querySelector(`.letter-box[data-i="${pos}"]`);
      nextBox.classList.add('current');
      glowKey(mode === 'build' ? target[pos] : null);
    }
  } else {
    wrongAnswer(document.querySelector(`.letter-box[data-i="${pos}"]`));
  }
}

function wrongAnswer(el) {
  sndWrong();
  resetStreak();
  if (el) {
    el.classList.remove('wrong');
    void el.offsetWidth; // restart animation
    el.classList.add('wrong');
    el.style.animation = 'balloonShake .4s ease';
    setTimeout(() => { el.style.animation = ''; el.classList.remove('wrong'); }, 450);
  }
}

function completeOne(delay = 900) {
  roundDone++;
  renderDots();
  if (roundDone >= ROUND_LENGTH) {
    setTimeout(showCelebration, delay);
  } else {
    setTimeout(nextChallenge, delay);
  }
}

/* ================= hint (spell mode) ================= */
hintBtn.addEventListener('click', () => {
  if (mode !== 'spell' || busy) return;
  const letter = target[pos];
  glowKey(letter);
  say(letter);
  setTimeout(() => { if (mode === 'spell') glowKey(null); }, 2500);
});

/* ================= celebration ================= */
function showCelebration() {
  const praise = PRAISE[Math.floor(Math.random() * PRAISE.length)];
  $('celebrateTitle').textContent = praise;
  $('celebrateSub').textContent = `You finished ${ROUND_LENGTH} in a row! ⭐ ${stars} stars!`;
  const unlocked = TROPHIES.filter(([n]) => stars >= n);
  $('celebrateEmoji').textContent = unlocked.length ? unlocked[unlocked.length - 1][1] : '🏆';
  $('celebrate').classList.add('show');
  sndFanfare();
  bigConfetti();
  say(praise.toLowerCase());
  // milestone reward: finishing the round digs up ONE gem — harder modes dig rarer
  const luck = mode === 'spell' ? 2.5 : mode === 'build' ? 1.5 : 1;
  setTimeout(() => {
    awardGem(innerWidth / 2, innerHeight * 0.32, luck, rylanBonus ? 'rare' : null);
    rylanBonus = false;
  }, 900);
}
$('celebrateBtn').addEventListener('click', () => {
  $('celebrate').classList.remove('show');
  roundDone = 0;
  renderDots();
  nextChallenge();
});

/* ================= navigation ================= */
document.querySelectorAll('.mode-card').forEach(card => {
  card.addEventListener('click', () => {
    audio(); // unlock audio on user gesture
    mode = card.dataset.mode;
    roundDone = 0;
    rylanBonus = false;
    resetStreak();
    menuEl.classList.remove('active');
    gameEl.classList.add('active');
    hintBtn.style.display = mode === 'spell' ? '' : 'none';
    $('starCount').textContent = stars;
    renderDots();
    nextChallenge();
  });
});
$('gemCaveBtn').addEventListener('click', () => {
  renderGemCave();
  menuEl.classList.remove('active');
  $('gemcave').classList.add('active');
});
$('gemBackBtn').addEventListener('click', () => {
  $('gemcave').classList.remove('active');
  menuEl.classList.add('active');
});
$('backBtn').addEventListener('click', () => {
  mode = null;
  speechSynthesis.cancel();
  gameEl.classList.remove('active');
  menuEl.classList.add('active');
  renderTrophies();
});

/* ================= global key listener ================= */
window.addEventListener('keydown', (e) => {
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  const k = e.key.toUpperCase();
  if (k.length === 1 && k >= 'A' && k <= 'Z') {
    e.preventDefault();
    handleLetter(k);
  }
});

/* ================= init ================= */
(function init() {
  // rainbow title
  const rainbow = (text) => text.split('').map((ch, i) =>
    ch === ' ' ? ' ' : `<span class="rainbow-${(i % 6) + 1}">${ch}</span>`
  ).join('');
  $('gameTitle').innerHTML = rainbow("RYLAN'S") +
    `<span class="line2">${rainbow('TYPING QUEST!')}</span>`;
  buildKeyboard();
  renderTrophies();
  $('starCount').textContent = stars;
  $('gemCount').textContent = gemTotal();
})();
</script>
</body>
</html>
